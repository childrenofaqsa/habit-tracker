in routine module , in the header (where my day , all habits , calender and edit mode icons are present) , left to my day button plact a new button nameed "pick" when pick is pressed, a new screen will come , the screen will contain all elements of my day screen additional to a new  row top of all habits , we are calling it picked habits , here if i tap on a habit , instead of green tick , it will be added on the new picked row (sorted by the picked order) . also the order can be sorted by manually drag left or right.  there will be a "Done" button at the top right corner of the screen to save the picked habits and return to the main My Day screen. When returning, the picked habits will be displayed in the new row above all other habits in original my day screen , and they will retain their order as set by the user. also i can tick or cross the habits inside picked row like just like the regular habits. The picked habits will also have the same functionality as regular habits, allowing users to mark them as completed or not completed. If a habit is marked as completed in the picked row, it will reflect in the main My Day screen as well.